<svg width="512" height="512" viewBox="125 70 270 370" xmlns="http://www.w3.org/2000/svg">
  <!-- 精确居中对齐的编组 -->
  <g transform="translate(6, 26)">
    
    <!-- === 后景面 (阴影面与右侧面) === -->
    <!-- 1. 底部尾巴的右侧面 -->
    <polygon points="320,340 360,300 360,360 320,400" fill="#888888"/>

    <!-- 2. 下半段竖干的右侧面 -->
    <polygon points="260,260 300,220 300,300 260,340" fill="#888888"/>

    <!-- 3. 上半段竖干的右侧面 -->
    <polygon points="260,100 300,60 300,160 260,200" fill="#888888"/>

    <!-- 4. 右侧横笔的右侧面 -->
    <polygon points="320,200 360,160 360,220 320,260" fill="#888888"/>

    <!-- === 顶面 (受光面) === -->
    <!-- 5. 底部尾巴的顶面 -->
    <polygon points="260,340 320,340 360,300 300,300" fill="#E5E5E5"/>

    <!-- 6. 左侧横笔的顶面 -->
    <polygon points="140,200 200,200 240,160 180,160" fill="#E5E5E5"/>

    <!-- 7. 右侧横笔的顶面 -->
    <polygon points="260,200 320,200 360,160 300,160" fill="#E5E5E5"/>

    <!-- 8. 顶部主干的顶面 -->
    <polygon points="200,100 260,100 300,60 240,60" fill="#E5E5E5"/>

    <!-- === 前景面 (正面主视觉，包含圆滑过渡的左下角) === -->
    <path d="
      M 200 100
      L 260 100
      L 260 200
      L 320 200
      L 320 260
      L 260 260
      L 260 340
      L 320 340
      L 320 400
      L 260 400
      A 60 60 0 0 1 200 340
      L 200 260
      L 140 260
      L 140 200
      L 200 200
      Z
    " fill="#111111"/>
    
  </g>
</svg>
