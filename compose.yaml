services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NODE_BASE_IMAGE=${NODE_BASE_IMAGE:-node:22-alpine}
        - NPM_REGISTRY=${NPM_REGISTRY:-}
    depends_on:
      - api
      - preview
      - realtime
    ports:
      - "${WEB_PUBLISH_PORT:-3000}:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_API_SCHEME=${VITE_API_SCHEME:-}
      - VITE_API_HOST=${VITE_API_HOST:-}
      - VITE_API_PORT=${VITE_API_PORT:-8000}
      - VITE_PREVIEW_URL=${VITE_PREVIEW_URL:-}
      - VITE_PREVIEW_SCHEME=${VITE_PREVIEW_SCHEME:-}
      - VITE_PREVIEW_HOST=${VITE_PREVIEW_HOST:-}
      - VITE_PREVIEW_PORT=${VITE_PREVIEW_PORT:-8002}
      - VITE_REALTIME_URL=${VITE_REALTIME_URL:-}
      - VITE_REALTIME_SCHEME=${VITE_REALTIME_SCHEME:-}
      - VITE_REALTIME_HOST=${VITE_REALTIME_HOST:-}
      - VITE_REALTIME_PORT=${VITE_REALTIME_PORT:-8003}
      - API_PROXY_TARGET=${API_PROXY_TARGET:-}
      - API_PROXY_SCHEME=${API_PROXY_SCHEME:-http}
      - API_PROXY_HOST=${API_PROXY_HOST:-api}
      - API_PROXY_PORT=${API_PROXY_PORT:-8000}
      - PREVIEW_PROXY_TARGET=${PREVIEW_PROXY_TARGET:-}
      - PREVIEW_PROXY_TARGETS=${PREVIEW_PROXY_TARGETS:-}
      - PREVIEW_PROXY_SCHEME=${PREVIEW_PROXY_SCHEME:-http}
      - PREVIEW_PROXY_HOST=${PREVIEW_PROXY_HOST:-preview}
      - PREVIEW_PROXY_PORT=${PREVIEW_PROXY_PORT:-8002}
      - REALTIME_PROXY_TARGET=${REALTIME_PROXY_TARGET:-}
      - REALTIME_PROXY_TARGETS=${REALTIME_PROXY_TARGETS:-}
      - REALTIME_PROXY_SCHEME=${REALTIME_PROXY_SCHEME:-ws}
      - REALTIME_PROXY_HOST=${REALTIME_PROXY_HOST:-realtime}
      - REALTIME_PROXY_PORT=${REALTIME_PROXY_PORT:-8003}
    networks:
      app-net:
      service-ip-net:
        ipv4_address: ${WEB_NETWORK_IP:-172.30.0.20}

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        - PYTHON_BASE_IMAGE=${PYTHON312_BASE_IMAGE:-python:3.12-slim}
        - PIP_INDEX_URL=${PIP_INDEX_URL:-}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-}
    depends_on:
      db:
        condition: service_healthy
      compiler:
        condition: service_started
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - COMPILER_URL=${COMPILER_URL:-}
      - COMPILER_SCHEME=${COMPILER_SCHEME:-http}
      - COMPILER_HOST=${COMPILER_HOST:-compiler}
      - COMPILER_PORT=${COMPILER_PORT:-8001}
      - COMPILER_TIMEOUT_SECONDS=${COMPILER_TIMEOUT_SECONDS:-10}
      - PREVIEW_URL=${PREVIEW_URL:-}
      - PREVIEW_URLS=${PREVIEW_URLS:-}
      - PREVIEW_BROWSER_URL=${PREVIEW_BROWSER_URL:-}
      - PREVIEW_BROWSER_URLS=${PREVIEW_BROWSER_URLS:-}
      - PREVIEW_SCHEME=${PREVIEW_SCHEME:-http}
      - PREVIEW_HOST=${PREVIEW_HOST:-preview}
      - PREVIEW_PORT=${PREVIEW_PORT:-8002}
      - PREVIEW_INTERNAL_URL=${PREVIEW_INTERNAL_URL:-}
      - PREVIEW_INTERNAL_URLS=${PREVIEW_INTERNAL_URLS:-}
      - PREVIEW_INTERNAL_SCHEME=${PREVIEW_INTERNAL_SCHEME:-http}
      - PREVIEW_INTERNAL_HOST=${PREVIEW_INTERNAL_HOST:-preview}
      - PREVIEW_INTERNAL_PORT=${PREVIEW_INTERNAL_PORT:-8002}
      - REALTIME_URL=${REALTIME_URL:-}
      - REALTIME_URLS=${REALTIME_URLS:-}
      - REALTIME_BROWSER_URL=${REALTIME_BROWSER_URL:-}
      - REALTIME_BROWSER_URLS=${REALTIME_BROWSER_URLS:-}
      - REALTIME_SCHEME=${REALTIME_SCHEME:-ws}
      - REALTIME_HOST=${REALTIME_HOST:-realtime}
      - REALTIME_PORT=${REALTIME_PORT:-8003}
      - REALTIME_INTERNAL_URL=${REALTIME_INTERNAL_URL:-}
      - REALTIME_INTERNAL_URLS=${REALTIME_INTERNAL_URLS:-}
      - REALTIME_INTERNAL_SCHEME=${REALTIME_INTERNAL_SCHEME:-http}
      - REALTIME_INTERNAL_HOST=${REALTIME_INTERNAL_HOST:-realtime}
      - REALTIME_INTERNAL_PORT=${REALTIME_INTERNAL_PORT:-8003}
      - REALTIME_SECRET=${REALTIME_SECRET:-change-this-realtime-secret}
      - PREVIEW_SECRET=${PREVIEW_SECRET:-change-this-preview-secret}
      - WORKSPACE_DIR=${WORKSPACE_DIR:-/workspace/projects}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
    ports:
      - "${API_PUBLISH_PORT:-8000}:8000"
    volumes:
      - ./storage/projects:/workspace/projects
    networks:
      app-net:
      service-ip-net:
        ipv4_address: ${API_NETWORK_IP:-172.30.0.10}

  db:
    image: ${POSTGRES_IMAGE:-postgres:16}
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "${DB_PUBLISH_PORT:-5432}:5432"
    networks:
      app-net:
      service-ip-net:
        ipv4_address: ${DB_NETWORK_IP:-172.30.0.15}

  compiler:
    build:
      context: ./services/compiler
      dockerfile: Dockerfile
      args:
        - PYTHON_BASE_IMAGE=${PYTHON311_BASE_IMAGE:-python:3.11-slim}
        - APT_MIRROR=${APT_MIRROR:-}
        - TYPST_DOWNLOAD_URL=${TYPST_DOWNLOAD_URL:-https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz}
        - TYPST_VERSION=${TYPST_VERSION:-0.14.2}
    ports:
      - "${COMPILER_PUBLISH_PORT:-8001}:8001"
    networks:
      app-net:
      service-ip-net:
        ipv4_address: ${COMPILER_NETWORK_IP:-172.30.0.11}

  preview:
    build:
      context: ./services/preview
      dockerfile: Dockerfile
      args:
        - PYTHON_BASE_IMAGE=${PYTHON312_BASE_IMAGE:-python:3.12-slim}
        - PIP_INDEX_URL=${PIP_INDEX_URL:-}
        - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-}
        - APT_MIRROR=${APT_MIRROR:-}
        - TINYMIST_DOWNLOAD_URL=${TINYMIST_DOWNLOAD_URL:-https://github.com/Myriad-Dreamin/tinymist/releases/download/v0.14.8/tinymist-x86_64-unknown-linux-musl.tar.gz}
        - TINYMIST_VERSION=${TINYMIST_VERSION:-0.14.8}
    depends_on:
      api:
        condition: service_started
    environment:
      - PREVIEW_WORKSPACE_DIR=${PREVIEW_WORKSPACE_DIR:-/tmp/typst-preview-workspaces}
      - SESSION_IDLE_SECONDS=${SESSION_IDLE_SECONDS:-1800}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-}
      - API_INTERNAL_SCHEME=${API_INTERNAL_SCHEME:-http}
      - API_INTERNAL_HOST=${API_INTERNAL_HOST:-api}
      - API_INTERNAL_PORT=${API_INTERNAL_PORT:-8000}
      - API_HOST=${API_HOST:-api}
      - API_PORT=${API_PORT:-8000}
      - PREVIEW_SECRET=${PREVIEW_SECRET:-change-this-preview-secret}
    ports:
      - "${PREVIEW_PUBLISH_PORT:-8002}:8002"
    networks:
      app-net:
      service-ip-net:
        ipv4_address: ${PREVIEW_NETWORK_IP:-172.30.0.12}

  realtime:
    build:
      context: ./services/realtime
      dockerfile: Dockerfile
      args:
        - NODE_BASE_IMAGE=${NODE_BASE_IMAGE:-node:22-alpine}
        - NPM_REGISTRY=${NPM_REGISTRY:-}
    depends_on:
      - api
    environment:
      - REALTIME_PORT=${REALTIME_PORT:-8003}
      - REALTIME_SECRET=${REALTIME_SECRET:-change-this-realtime-secret}
      - API_INTERNAL_URL=${API_INTERNAL_URL:-}
      - API_INTERNAL_SCHEME=${API_INTERNAL_SCHEME:-http}
      - API_INTERNAL_HOST=${API_INTERNAL_HOST:-api}
      - API_INTERNAL_PORT=${API_INTERNAL_PORT:-8000}
      - API_HOST=${API_HOST:-api}
      - API_PORT=${API_PORT:-8000}
    ports:
      - "${REALTIME_PUBLISH_PORT:-8003}:8003"
    networks:
      app-net:
      service-ip-net:
        ipv4_address: ${REALTIME_NETWORK_IP:-172.30.0.13}

networks:
  app-net:
  service-ip-net:
    ipam:
      config:
        - subnet: ${SERVICE_IP_SUBNET:-172.30.0.0/24}

volumes:
  db-data:
